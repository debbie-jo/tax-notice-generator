name: Excel 샘플 파일 생성

on:
  workflow_dispatch:  # 수동으로 실행

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Python 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: openpyxl 설치
      run: pip install openpyxl
    
    - name: Excel 파일 생성
      run: python create_sample_excel.py
    
    - name: 생성된 파일 업로드
      uses: actions/upload-artifact@v3
      with:
        name: excel-files
        path: '*.xlsx'
